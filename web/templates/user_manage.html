{% extends "layout.html" %}
{% block title %}用户管理 - 钉钉工单系统{% endblock %}
{% block content %}
<h1>用户管理</h1>

<table class="table">
  <thead>
    <tr>
      <th>ID</th>
      <th>姓名</th>
      <th>钉钉 ID</th>
      <th>角色</th>
      <th>部门</th>
    </tr>
  </thead>
  <tbody>
    {% for u in users %}
    <tr>
      <td>{{ u.id }}</td>
      <td>{{ u.name }}</td>
      <td>{{ u.dingtalk_user_id or '-' }}</td>
      <td>{{ u.role }}</td>
      <td>{{ u.department.name if u.department else '-' }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
